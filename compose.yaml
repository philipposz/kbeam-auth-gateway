services:
  auth-gateway:
    build: .
    env_file:
      - .env
    environment:
      KBEAM_AUTH_BIND: 0.0.0.0:18090
    ports:
      - "127.0.0.1:18090:18090"
    volumes:
      - auth-gateway-var:/app/var
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18090/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  auth-gateway-var:
