name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Lint
        run: python -m ruff check .
      - name: Public hygiene
        run: python tools/public_hygiene_check.py
      - name: Test
        run: python -m pytest
