<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KBeam Auth Gateway Demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8fa;
        color: #20242c;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
      }
      main {
        width: min(980px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 28px;
      }
      h1 {
        font-size: 28px;
        line-height: 1.1;
        margin: 0;
        letter-spacing: 0;
      }
      section {
        display: grid;
        grid-template-columns: minmax(260px, 360px) 1fr;
        gap: 24px;
        align-items: start;
      }
      .panel {
        background: #ffffff;
        border: 1px solid #d9dee7;
        border-radius: 8px;
        padding: 18px;
      }
      .controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      button, a.button {
        appearance: none;
        border: 1px solid #2f6fed;
        background: #2f6fed;
        color: #ffffff;
        border-radius: 6px;
        padding: 10px 14px;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
        text-decoration: none;
      }
      button.secondary, a.button.secondary {
        background: #ffffff;
        color: #2f6fed;
      }
      button:disabled {
        opacity: 0.55;
        cursor: default;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 650;
        margin: 16px 0 6px;
      }
      input {
        width: 100%;
        min-height: 40px;
        border: 1px solid #c7ceda;
        border-radius: 6px;
        padding: 8px 10px;
        font: inherit;
      }
      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        min-height: 260px;
        margin: 0;
        background: #171b22;
        color: #e9edf5;
        border-radius: 8px;
        padding: 16px;
        font-size: 13px;
        line-height: 1.45;
      }
      #qr {
        min-height: 260px;
        display: grid;
        place-items: center;
        border: 1px dashed #b5becd;
        border-radius: 8px;
        background: #ffffff;
        color: #20242c;
        padding: 10px;
      }
      #qr svg {
        width: min(100%, 240px);
        height: auto;
        background: #ffffff;
        border-radius: 4px;
      }
      .status {
        font-weight: 700;
      }
      .notice {
        margin-top: 16px;
        border-radius: 8px;
        border: 1px solid #c7ceda;
        padding: 12px;
        line-height: 1.45;
      }
      .notice strong {
        display: block;
        margin-bottom: 4px;
      }
      .notice.success {
        background: #ecfdf3;
        border-color: #8bd7a6;
        color: #15572b;
      }
      .notice[hidden] {
        display: none;
      }
      @media (max-width: 760px) {
        section {
          grid-template-columns: 1fr;
        }
        header {
          align-items: flex-start;
          flex-direction: column;
        }
      }
      @media (prefers-color-scheme: dark) {
        :root {
          background: #11151b;
          color: #eef2f8;
        }
        .panel, input, button.secondary, a.button.secondary {
          background: #171d25;
          border-color: #313b4b;
          color: #eef2f8;
        }
        .notice.success {
          background: #10391f;
          border-color: #2d854c;
          color: #d9fbe3;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>KBeam Auth Gateway Demo</h1>
        <div class="controls">
          <button id="create">New login</button>
          <button id="poll" class="secondary" disabled>Poll</button>
          <button id="logout" class="secondary">Logout</button>
        </div>
      </header>
      <section>
        <div class="panel">
          <div id="qr">No login ticket yet.</div>
          <label for="approveUrl">Approve URL</label>
          <input id="approveUrl" readonly>
          <label for="ticketStatus">Ticket status</label>
          <input id="ticketStatus" class="status" readonly value="idle">
          <div id="sessionNotice" class="notice success" hidden>
            <strong>Login successful</strong>
            <span id="sessionAddress"></span>
          </div>
        </div>
        <pre id="log">{}</pre>
      </section>
    </main>
    <script>
      const state = { ticket: null, pollTimer: null, expiryTimer: null, eventSource: null, pollDelayMs: 2000 };
      const createBtn = document.querySelector("#create");
      const pollBtn = document.querySelector("#poll");
      const logoutBtn = document.querySelector("#logout");
      const qr = document.querySelector("#qr");
      const approveUrl = document.querySelector("#approveUrl");
      const ticketStatus = document.querySelector("#ticketStatus");
      const sessionNotice = document.querySelector("#sessionNotice");
      const sessionAddress = document.querySelector("#sessionAddress");
      const log = document.querySelector("#log");

      function show(value) {
        log.textContent = JSON.stringify(value, null, 2);
      }

      async function request(path, options = {}) {
        const response = await fetch(path, {
          credentials: "include",
          headers: { "Accept": "application/json", ...(options.headers || {}) },
          ...options,
        });
        if (response.status === 204) {
          return { ok: true, status: 204 };
        }
        const body = await response.json();
        return { status: response.status, ...body };
      }

      function stopPolling() {
        if (state.pollTimer) {
          window.clearTimeout(state.pollTimer);
          state.pollTimer = null;
        }
        if (state.eventSource) {
          state.eventSource.close();
          state.eventSource = null;
        }
        if (state.expiryTimer) {
          window.clearTimeout(state.expiryTimer);
          state.expiryTimer = null;
        }
      }

      function showSession(session) {
        sessionNotice.hidden = false;
        sessionAddress.textContent = session?.address
          ? `Wallet ${session.address} is signed in.`
          : "Session is active.";
      }

      function clearSessionNotice() {
        sessionNotice.hidden = true;
        sessionNotice.classList.remove("success");
        sessionAddress.textContent = "";
      }

      function showExpired() {
        stopPolling();
        ticketStatus.value = "expired";
        sessionNotice.hidden = false;
        sessionNotice.classList.remove("success");
        sessionAddress.textContent = "QR expired. Create a new login ticket.";
        pollBtn.disabled = true;
      }

      function scheduleExpiry() {
        if (!state.ticket?.expiresAt) return;
        const expiresAtMs = Date.parse(state.ticket.expiresAt);
        const delay = expiresAtMs - Date.now();
        if (!Number.isFinite(delay) || delay <= 0) {
          showExpired();
          return;
        }
        state.expiryTimer = window.setTimeout(showExpired, delay + 250);
      }

      async function pollTicket() {
        if (!state.ticket) return;
        const query = new URLSearchParams({ pollToken: state.ticket.pollToken });
        const result = await request(`/api/auth/device-login/${state.ticket.ticketId}?${query}`);
        show(result);
        if (result.ok) {
          ticketStatus.value = result.deviceLogin.status;
          if (result.session) {
            showSession(result.session);
            stopPolling();
            pollBtn.disabled = true;
          } else if (result.deviceLogin.status === "pending") {
            state.pollDelayMs = Math.min(Math.round(state.pollDelayMs * 1.35), 8000);
          }
        } else if (result.error === "device_login_ticket_not_found") {
          showExpired();
        }
      }

      function scheduleFallbackPoll() {
        if (!state.ticket || state.pollTimer) return;
        state.pollTimer = window.setTimeout(async () => {
          state.pollTimer = null;
          try {
            await pollTicket();
          } catch (error) {
            show({ ok: false, error: String(error) });
            state.pollDelayMs = Math.min(Math.round(state.pollDelayMs * 1.5), 10000);
          }
          if (state.ticket && !sessionNotice.classList.contains("success") && ticketStatus.value !== "expired") {
            scheduleFallbackPoll();
          }
        }, state.pollDelayMs);
      }

      function startEvents() {
        if (!state.ticket || !window.EventSource) {
          scheduleFallbackPoll();
          return;
        }
        const query = new URLSearchParams({ pollToken: state.ticket.pollToken });
        state.eventSource = new EventSource(`/api/auth/device-login/${state.ticket.ticketId}/events?${query}`);
        state.eventSource.addEventListener("status", (event) => {
          const payload = JSON.parse(event.data);
          show(payload);
          ticketStatus.value = payload.deviceLogin.status;
        });
        state.eventSource.addEventListener("approved", async (event) => {
          const payload = JSON.parse(event.data);
          show(payload);
          await pollTicket();
        });
        state.eventSource.addEventListener("expired", () => {
          showExpired();
        });
        state.eventSource.onerror = () => {
          if (state.eventSource) {
            state.eventSource.close();
            state.eventSource = null;
          }
          scheduleFallbackPoll();
        };
      }

      async function refreshSession() {
        const result = await request("/api/auth/session");
        if (result.ok && result.session) {
          showSession(result.session);
          show(result);
        }
      }

      createBtn.addEventListener("click", async () => {
        stopPolling();
        clearSessionNotice();
        const result = await request("/api/auth/device-login", { method: "POST" });
        show(result);
        if (result.ok) {
          state.ticket = result.deviceLogin;
          qr.innerHTML = state.ticket.qrSvg;
          approveUrl.value = state.ticket.approveURL;
          ticketStatus.value = state.ticket.status;
          pollBtn.disabled = false;
          state.pollDelayMs = 2000;
          scheduleExpiry();
          startEvents();
        }
      });

      pollBtn.addEventListener("click", async () => {
        pollTicket().catch((error) => show({ ok: false, error: String(error) }));
      });

      logoutBtn.addEventListener("click", async () => {
        stopPolling();
        const result = await request("/api/auth/sessions/current", { method: "DELETE" });
        clearSessionNotice();
        ticketStatus.value = state.ticket ? state.ticket.status : "idle";
        show(result);
      });

      refreshSession().catch(() => {});
    </script>
  </body>
</html>
